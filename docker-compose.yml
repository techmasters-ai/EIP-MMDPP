services:
  # ---------------------------------------------------------------------------
  # PostgreSQL with pgvector + Apache AGE
  # ---------------------------------------------------------------------------
  postgres:
    build:
      context: ./docker/postgres
      dockerfile: Dockerfile
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-eip}
      POSTGRES_USER: ${POSTGRES_USER:-eip}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-eip_secret}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-eip} -d ${POSTGRES_DB:-eip}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

  # ---------------------------------------------------------------------------
  # Redis — Celery broker + result backend + cache
  # ---------------------------------------------------------------------------
  redis:
    image: redis:7.4-alpine
    restart: unless-stopped
    ports:
      - "${REDIS_PORT:-6379}:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5

  # ---------------------------------------------------------------------------
  # MinIO — object storage for raw documents and derived artifacts
  # ---------------------------------------------------------------------------
  minio:
    image: minio/minio:latest
    restart: unless-stopped
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ACCESS_KEY:-minioadmin}
      MINIO_ROOT_PASSWORD: ${MINIO_SECRET_KEY:-minioadmin}
    ports:
      - "${MINIO_API_PORT:-9000}:9000"
      - "${MINIO_CONSOLE_PORT:-9001}:9001"
    volumes:
      - minio_data:/data
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s

  # MinIO bucket initialization (runs once, exits)
  minio-init:
    image: minio/mc:latest
    depends_on:
      minio:
        condition: service_healthy
    entrypoint: >
      /bin/sh -c "
        mc alias set local http://minio:9000 ${MINIO_ACCESS_KEY:-minioadmin} ${MINIO_SECRET_KEY:-minioadmin};
        mc mb --ignore-existing local/${MINIO_BUCKET_RAW:-eip-raw};
        mc mb --ignore-existing local/${MINIO_BUCKET_DERIVED:-eip-derived};
        exit 0;
      "

  # ---------------------------------------------------------------------------
  # Docling — document conversion service (granite-docling-258M VLM)
  # ---------------------------------------------------------------------------
  docling:
    build:
      context: ./docker/docling
      dockerfile: Dockerfile
    restart: unless-stopped
    environment:
      DOCLING_DEVICE: ${DOCLING_DEVICE:-cuda}
      DOCLING_DTYPE: ${DOCLING_DTYPE:-bfloat16}
    ports:
      - "${DOCLING_PORT:-8001}:8001"
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8001/health"]
      interval: 15s
      timeout: 10s
      retries: 10
      start_period: 120s

  # ---------------------------------------------------------------------------
  # API — FastAPI application
  # ---------------------------------------------------------------------------
  api:
    build:
      context: .
      dockerfile: Dockerfile
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      minio:
        condition: service_healthy
    env_file:
      - .env
    environment:
      DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER:-eip}:${POSTGRES_PASSWORD:-eip_secret}@postgres:5432/${POSTGRES_DB:-eip}
      DATABASE_URL_SYNC: postgresql+psycopg2://${POSTGRES_USER:-eip}:${POSTGRES_PASSWORD:-eip_secret}@postgres:5432/${POSTGRES_DB:-eip}
      REDIS_URL: redis://redis:6379/0
      CELERY_BROKER_URL: redis://redis:6379/0
      CELERY_RESULT_BACKEND: redis://redis:6379/1
      MINIO_ENDPOINT: minio:9000
    ports:
      - "${API_PORT:-8000}:8000"
    command: >
      sh -c "
        alembic upgrade head &&
        python scripts/seed_ontology.py &&
        uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload
      "
    volumes:
      - ./app:/app/app
      - model_cache:/root/.cache

  # ---------------------------------------------------------------------------
  # Worker — Celery worker (all queues)
  # ---------------------------------------------------------------------------
  worker:
    build:
      context: .
      dockerfile: Dockerfile
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      minio:
        condition: service_healthy
      docling:
        condition: service_healthy
    env_file:
      - .env
    environment:
      DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER:-eip}:${POSTGRES_PASSWORD:-eip_secret}@postgres:5432/${POSTGRES_DB:-eip}
      DATABASE_URL_SYNC: postgresql+psycopg2://${POSTGRES_USER:-eip}:${POSTGRES_PASSWORD:-eip_secret}@postgres:5432/${POSTGRES_DB:-eip}
      REDIS_URL: redis://redis:6379/0
      CELERY_BROKER_URL: redis://redis:6379/0
      CELERY_RESULT_BACKEND: redis://redis:6379/1
      MINIO_ENDPOINT: minio:9000
    command: >
      celery -A app.workers.celery_app worker
        --loglevel=info
        --queues=ingest,extract,embed,graph
        --concurrency=${WORKER_CONCURRENCY:-4}
    volumes:
      - ./app:/app/app
      - model_cache:/root/.cache
      - watch_dirs:/watch
    extra_hosts:
      - "ollama:host-gateway"

  # ---------------------------------------------------------------------------
  # Beat — Celery Beat scheduler (directory watcher + maintenance)
  # ---------------------------------------------------------------------------
  beat:
    build:
      context: .
      dockerfile: Dockerfile
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    env_file:
      - .env
    environment:
      DATABASE_URL_SYNC: postgresql+psycopg2://${POSTGRES_USER:-eip}:${POSTGRES_PASSWORD:-eip_secret}@postgres:5432/${POSTGRES_DB:-eip}
      CELERY_BROKER_URL: redis://redis:6379/0
      CELERY_RESULT_BACKEND: redis://redis:6379/1
    command: >
      celery -A app.workers.celery_app beat
        --loglevel=info
        --scheduler=celery.beat:PersistentScheduler
    volumes:
      - celerybeat_data:/var/run/celery
      - watch_dirs:/watch

volumes:
  postgres_data:
  redis_data:
  minio_data:
  model_cache:
  watch_dirs:
  celerybeat_data:

networks:
  default:
    # Internal-only network for inter-service communication.
    # Ollama is reached via host-gateway (extra_hosts) to avoid DNS
    # conflicts with other stacks (e.g. open-webui) on shared networks.
