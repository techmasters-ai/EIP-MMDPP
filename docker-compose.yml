services:
  # ---------------------------------------------------------------------------
  # PostgreSQL with pgvector
  # ---------------------------------------------------------------------------
  postgres:
    build:
      context: ./docker/postgres
      dockerfile: Dockerfile
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-eip}
      POSTGRES_USER: ${POSTGRES_USER:-eip}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-eip_secret}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-eip} -d ${POSTGRES_DB:-eip}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

  # ---------------------------------------------------------------------------
  # Redis — Celery broker + result backend + cache
  # ---------------------------------------------------------------------------
  redis:
    image: redis:7.4-alpine
    restart: unless-stopped
    ports:
      - "${REDIS_PORT:-6379}:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5

  # ---------------------------------------------------------------------------
  # MinIO — object storage for raw documents and derived artifacts
  # ---------------------------------------------------------------------------
  minio:
    image: minio/minio:latest
    restart: unless-stopped
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ACCESS_KEY:-minioadmin}
      MINIO_ROOT_PASSWORD: ${MINIO_SECRET_KEY:-minioadmin}
    ports:
      - "${MINIO_API_PORT:-9000}:9000"
      - "${MINIO_CONSOLE_PORT:-9001}:9001"
    volumes:
      - minio_data:/data
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s

  # MinIO bucket initialization (runs once, exits)
  minio-init:
    image: minio/mc:latest
    depends_on:
      minio:
        condition: service_healthy
    entrypoint: >
      /bin/sh -c "
        mc alias set local http://minio:9000 ${MINIO_ACCESS_KEY:-minioadmin} ${MINIO_SECRET_KEY:-minioadmin};
        mc mb --ignore-existing local/${MINIO_BUCKET_RAW:-eip-raw};
        mc mb --ignore-existing local/${MINIO_BUCKET_DERIVED:-eip-derived};
        exit 0;
      "

  # ---------------------------------------------------------------------------
  # Neo4j — knowledge graph database (replaces Apache AGE)
  # ---------------------------------------------------------------------------
  neo4j:
    image: neo4j:2025-community
    restart: unless-stopped
    environment:
      NEO4J_AUTH: ${NEO4J_USER:-neo4j}/${NEO4J_PASSWORD:-eip_neo4j_secret}
      NEO4J_PLUGINS: '["apoc"]'
      NEO4J_server_memory_heap_max__size: "512m"
      NEO4J_server_memory_pagecache_size: "256m"
    ports:
      - "${NEO4J_BOLT_PORT:-7687}:7687"
      - "${NEO4J_HTTP_PORT:-7474}:7474"
    volumes:
      - neo4j_data:/data
      - ./docker/neo4j:/docker-entrypoint-initdb.d
    healthcheck:
      test: ["CMD", "cypher-shell", "-u", "${NEO4J_USER:-neo4j}", "-p", "${NEO4J_PASSWORD:-eip_neo4j_secret}", "RETURN 1"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s

  # ---------------------------------------------------------------------------
  # Qdrant — vector search engine (replaces pgvector)
  # ---------------------------------------------------------------------------
  qdrant:
    image: qdrant/qdrant:v1.13.2
    restart: unless-stopped
    ports:
      - "${QDRANT_HTTP_PORT:-6333}:6333"
      - "${QDRANT_GRPC_PORT:-6334}:6334"
    volumes:
      - qdrant_data:/qdrant/storage
    healthcheck:
      test: ["CMD-SHELL", "bash -c 'echo > /dev/tcp/localhost/6333'"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ---------------------------------------------------------------------------
  # Docling — document conversion service (granite-docling-258M VLM)
  # ---------------------------------------------------------------------------
  docling:
    build:
      context: ./docker/docling
      dockerfile: Dockerfile
    restart: unless-stopped
    environment:
      DOCLING_DEVICE: ${DOCLING_DEVICE:-cuda}
      DOCLING_DTYPE: ${DOCLING_DTYPE:-bfloat16}
      # Match pipeline Redis semaphore permits (DOCLING_CONCURRENCY)
      DOCLING_MAX_CONCURRENT: ${DOCLING_CONCURRENCY:-1}
      LOG_LEVEL: ${LOG_LEVEL:-INFO}
      DOCLING_OCR_LANG: ${DOCLING_OCR_LANG:-en}
    ports:
      - "${DOCLING_PORT:-8001}:8001"
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8001/health"]
      interval: 30s
      timeout: 15s
      retries: 20
      start_period: 120s
    networks:
      - default

  # ---------------------------------------------------------------------------
  # Docling-Graph — ontology-driven entity/relationship extraction
  # ---------------------------------------------------------------------------
  docling-graph:
    build:
      context: ./docker/docling-graph
      dockerfile: Dockerfile
    restart: unless-stopped
    volumes:
      - ./ontology:/app/ontology:ro
    environment:
      ONTOLOGY_PATH: /app/ontology/ontology.yaml
      LLM_PROVIDER: ${DOCLING_GRAPH_LLM_PROVIDER:-ollama}
      LLM_MODEL: ${DOCLING_GRAPH_LLM_MODEL:-llama3.2}
      OLLAMA_BASE_URL: ${OLLAMA_BASE_URL:-http://ollama:11434}
      OLLAMA_NUM_CTX: ${OLLAMA_NUM_CTX:-16384}
      OLLAMA_THINK: ${OLLAMA_THINK:-}              # "low", "medium", "high" for gpt-oss thinking level
      # LiteLLM reads OLLAMA_API_BASE; must be set as container env var
      # (not in Python) because docling-graph creates its own LLM client.
      OLLAMA_API_BASE: ${OLLAMA_BASE_URL:-http://ollama:11434}
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      OPENAI_BASE_URL: ${OPENAI_BASE_URL:-}
      LOG_LEVEL: ${LOG_LEVEL:-INFO}
      GRAPH_EXTRACTION_CHUNK_SIZE: ${GRAPH_EXTRACTION_CHUNK_SIZE:-100000}
      GRAPH_EXTRACTION_CHUNK_OVERLAP: ${GRAPH_EXTRACTION_CHUNK_OVERLAP:-2000}
      LLM_MAX_TOKENS: ${LLM_MAX_TOKENS:-64000}
      DOCLING_GRAPH_LLM_TIMEOUT: ${DOCLING_GRAPH_LLM_TIMEOUT:-10800}
    ports:
      - "${DOCLING_GRAPH_PORT:-8002}:8002"
    extra_hosts:
      - "ollama:host-gateway"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8002/health"]
      interval: 30s
      timeout: 15s
      retries: 10
      start_period: 60s
    networks:
      - default

  # ---------------------------------------------------------------------------
  # API — FastAPI application
  # ---------------------------------------------------------------------------
  api:
    build:
      context: .
      dockerfile: Dockerfile
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      minio:
        condition: service_healthy
      neo4j:
        condition: service_healthy
      qdrant:
        condition: service_healthy
    env_file:
      - .env
    environment:
      DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER:-eip}:${POSTGRES_PASSWORD:-eip_secret}@postgres:5432/${POSTGRES_DB:-eip}
      DATABASE_URL_SYNC: postgresql+psycopg2://${POSTGRES_USER:-eip}:${POSTGRES_PASSWORD:-eip_secret}@postgres:5432/${POSTGRES_DB:-eip}
      REDIS_URL: redis://redis:6379/0
      CELERY_BROKER_URL: redis://redis:6379/0
      CELERY_RESULT_BACKEND: redis://redis:6379/1
      MINIO_ENDPOINT: minio:9000
    ports:
      - "${API_PORT:-8000}:8000"
    command: >
      sh -c "
        alembic upgrade head &&
        python scripts/seed_ontology.py &&
        uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload
      "
    extra_hosts:
      - "ollama:host-gateway"
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]
    volumes:
      - ./app:/app/app
      - model_cache:/root/.cache
      - graphrag_data:/app/graphrag_data

  # ---------------------------------------------------------------------------
  # Worker — single Celery worker (all queues, default mode)
  # Use WORKER_SPLIT_ENABLED=true to run split workers instead.
  # ---------------------------------------------------------------------------
  worker:
    build:
      context: .
      dockerfile: Dockerfile
    restart: unless-stopped
    profiles:
      - ""
      - default
    depends_on:
      api:
        condition: service_started
      docling:
        condition: service_healthy
      docling-graph:
        condition: service_healthy
    env_file:
      - .env
    environment:
      DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER:-eip}:${POSTGRES_PASSWORD:-eip_secret}@postgres:5432/${POSTGRES_DB:-eip}
      DATABASE_URL_SYNC: postgresql+psycopg2://${POSTGRES_USER:-eip}:${POSTGRES_PASSWORD:-eip_secret}@postgres:5432/${POSTGRES_DB:-eip}
      REDIS_URL: redis://redis:6379/0
      CELERY_BROKER_URL: redis://redis:6379/0
      CELERY_RESULT_BACKEND: redis://redis:6379/1
      MINIO_ENDPOINT: minio:9000
    command: >
      celery -A app.workers.celery_app worker
        --loglevel=info
        --queues=celery,ingest,extract,embed,graph,graph_extract,trusted
        --concurrency=${WORKER_CONCURRENCY:-4}
    volumes:
      - ./app:/app/app
      - model_cache:/root/.cache
      - watch_dirs:/watch
      - graphrag_data:/app/graphrag_data
    extra_hosts:
      - "ollama:host-gateway"

  # ---------------------------------------------------------------------------
  # Split workers (v2) — activate with: docker compose --profile split up
  # ---------------------------------------------------------------------------
  worker-ingest:
    build:
      context: .
      dockerfile: Dockerfile
    restart: unless-stopped
    profiles:
      - split
    depends_on:
      api:
        condition: service_started
      docling:
        condition: service_healthy
      docling-graph:
        condition: service_healthy
    env_file:
      - .env
    environment:
      DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER:-eip}:${POSTGRES_PASSWORD:-eip_secret}@postgres:5432/${POSTGRES_DB:-eip}
      DATABASE_URL_SYNC: postgresql+psycopg2://${POSTGRES_USER:-eip}:${POSTGRES_PASSWORD:-eip_secret}@postgres:5432/${POSTGRES_DB:-eip}
      REDIS_URL: redis://redis:6379/0
      CELERY_BROKER_URL: redis://redis:6379/0
      CELERY_RESULT_BACKEND: redis://redis:6379/1
      MINIO_ENDPOINT: minio:9000
    command: >
      celery -A app.workers.celery_app worker
        --loglevel=info
        --queues=celery,ingest,extract
        --concurrency=${WORKER_INGEST_CONCURRENCY:-4}
        --hostname=worker-ingest@%h
    volumes:
      - ./app:/app/app
      - model_cache:/root/.cache
      - watch_dirs:/watch
    extra_hosts:
      - "ollama:host-gateway"

  worker-embed:
    build:
      context: .
      dockerfile: Dockerfile
    restart: unless-stopped
    profiles:
      - split
    depends_on:
      api:
        condition: service_started
    env_file:
      - .env
    environment:
      DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER:-eip}:${POSTGRES_PASSWORD:-eip_secret}@postgres:5432/${POSTGRES_DB:-eip}
      DATABASE_URL_SYNC: postgresql+psycopg2://${POSTGRES_USER:-eip}:${POSTGRES_PASSWORD:-eip_secret}@postgres:5432/${POSTGRES_DB:-eip}
      REDIS_URL: redis://redis:6379/0
      CELERY_BROKER_URL: redis://redis:6379/0
      CELERY_RESULT_BACKEND: redis://redis:6379/1
      MINIO_ENDPOINT: minio:9000
    command: >
      celery -A app.workers.celery_app worker
        --loglevel=info
        --queues=embed
        --concurrency=${WORKER_EMBED_CONCURRENCY:-2}
        --hostname=worker-embed@%h
    volumes:
      - ./app:/app/app
      - model_cache:/root/.cache
    extra_hosts:
      - "ollama:host-gateway"

  worker-graph:
    build:
      context: .
      dockerfile: Dockerfile
    restart: unless-stopped
    profiles:
      - split
    depends_on:
      api:
        condition: service_started
      neo4j:
        condition: service_healthy
    env_file:
      - .env
    environment:
      DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER:-eip}:${POSTGRES_PASSWORD:-eip_secret}@postgres:5432/${POSTGRES_DB:-eip}
      DATABASE_URL_SYNC: postgresql+psycopg2://${POSTGRES_USER:-eip}:${POSTGRES_PASSWORD:-eip_secret}@postgres:5432/${POSTGRES_DB:-eip}
      REDIS_URL: redis://redis:6379/0
      CELERY_BROKER_URL: redis://redis:6379/0
      CELERY_RESULT_BACKEND: redis://redis:6379/1
      MINIO_ENDPOINT: minio:9000
    command: >
      celery -A app.workers.celery_app worker
        --loglevel=info
        --queues=graph,graph_extract
        --concurrency=${WORKER_GRAPH_CONCURRENCY:-2}
        --hostname=worker-graph@%h
    volumes:
      - ./app:/app/app
      - model_cache:/root/.cache
      - graphrag_data:/app/graphrag_data
    extra_hosts:
      - "ollama:host-gateway"

  # ---------------------------------------------------------------------------
  # Beat — Celery Beat scheduler (directory watcher + maintenance)
  # ---------------------------------------------------------------------------
  beat:
    build:
      context: .
      dockerfile: Dockerfile
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    env_file:
      - .env
    environment:
      DATABASE_URL_SYNC: postgresql+psycopg2://${POSTGRES_USER:-eip}:${POSTGRES_PASSWORD:-eip_secret}@postgres:5432/${POSTGRES_DB:-eip}
      CELERY_BROKER_URL: redis://redis:6379/0
      CELERY_RESULT_BACKEND: redis://redis:6379/1
    command: >
      celery -A app.workers.celery_app beat
        --loglevel=info
        --scheduler=celery.beat:PersistentScheduler
    volumes:
      - celerybeat_data:/var/run/celery
      - watch_dirs:/watch
      - graphrag_data:/app/graphrag_data

volumes:
  postgres_data:
  redis_data:
  minio_data:
  neo4j_data:
  qdrant_data:
  model_cache:
  watch_dirs:
  celerybeat_data:
  graphrag_data:

networks:
  default:
    # Internal-only network for inter-service communication.
    # Ollama is reached via host-gateway (extra_hosts) to avoid DNS
    # conflicts with other stacks (e.g. open-webui) on shared networks.
