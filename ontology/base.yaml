  - name: HAS_PROPULSION
    label: "Has Propulsion"
    description: "Missile has a propulsion stack"
    source_type: MISSILE_SYSTEM
    target_type: PROPULSION_STACK
    cardinality: one_to_one

  - name: HAS_SEEKER
    label: "Has Seeker"
    description: "Missile has a terminal guidance seeker"
    source_type: MISSILE_SYSTEM
    target_type: SEEKER
    cardinality: one_to_one

  # --- Capability ---
  - name: PROVIDES
    label: "Provides"
    description: "System provides a capability (DoDAF DM2)"
    source_type: null
    target_type: CAPABILITY
    cardinality: many_to_many

  - name: HAS_TIMELINE
    label: "Has Timeline"
    description: "Weapon system has an engagement timeline"
    source_type: null
    target_type: ENGAGEMENT_TIMELINE
