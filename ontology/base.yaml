    target_type: FREQUENCY_BAND
    cardinality: many_to_many

  - name: USES_WAVEFORM
    label: "Uses Waveform"
    description: "Radar uses a specific waveform"
    source_type: RADAR_SYSTEM
    target_type: WAVEFORM
    cardinality: many_to_many

  - name: USES_MODULATION
    label: "Uses Modulation"
    description: "Waveform uses a modulation scheme"
    source_type: WAVEFORM
    target_type: MODULATION
    cardinality: many_to_many

  - name: EMITS
    label: "Emits"
    description: "System generates an RF emission"
    source_type: null
