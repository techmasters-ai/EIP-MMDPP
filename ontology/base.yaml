    description: "System has a major functional subsystem"
    source_type: null
    target_type: SUBSYSTEM
    cardinality: one_to_many

  - name: HAS_COMPONENT
    label: "Has Component"
    description: "System or subsystem has a physical component"
    source_type: null
    target_type: COMPONENT
    cardinality: one_to_many

  - name: HAS_STAGE
    label: "Has Stage"
    description: "Propulsion stack has a propulsion stage"
    source_type: PROPULSION_STACK
    target_type: PROPULSION_STAGE
    cardinality: one_to_many

  # --- Installation / Association ---
  - name: INSTALLED_ON
    label: "Installed On"
    description: "System is installed on a platform"
    source_type: null
    target_type: PLATFORM
    cardinality: many_to_one

  - name: DEPLOYED_ON
    label: "Deployed On"
