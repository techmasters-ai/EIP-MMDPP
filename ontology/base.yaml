    cardinality: many_to_many

  - name: ABOUT
    label: "About"
    description: "Assertion is about an entity"
    source_type: ASSERTION
    target_type: null
    cardinality: many_to_many

  # --- Legacy relationships retained for backward compatibility ---
  - name: IS_SUBSYSTEM_OF
    label: "Is Subsystem Of"
