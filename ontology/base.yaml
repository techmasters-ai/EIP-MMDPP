    cardinality: many_to_many

  - name: HAS_SCAN
    label: "Has Scan"
    description: "Radar has a scan pattern"
    source_type: RADAR_SYSTEM
    target_type: SCAN_PATTERN
    cardinality: one_to_many

  - name: HAS_RECEIVER
    label: "Has Receiver"
    description: "Radar has a receiver subsystem"
    source_type: RADAR_SYSTEM
    target_type: RECEIVER
    cardinality: one_to_many

  - name: HAS_TRANSMITTER
    label: "Has Transmitter"
    description: "Radar has a transmitter subsystem"
    source_type: RADAR_SYSTEM
    target_type: TRANSMITTER
    cardinality: one_to_many

  - name: HAS_ANTENNA
    label: "Has Antenna"
    description: "Radar has an antenna"
    source_type: RADAR_SYSTEM
    target_type: ANTENNA
    cardinality: one_to_many

  - name: HAS_PROCESSING_CHAIN
    label: "Has Processing Chain"
    description: "Radar has a signal processing chain"
    source_type: RADAR_SYSTEM
    target_type: SIGNAL_PROCESSING_CHAIN
    cardinality: one_to_one

  - name: HAS_PERFORMANCE
    label: "Has Performance"
